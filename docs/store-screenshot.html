<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 1280px;
      height: 800px;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Helvetica Neue", sans-serif;
      background: linear-gradient(135deg, #0f0f1a 0%, #1a1a2e 40%, #16213e 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    /* Background decoration */
    .bg-circle {
      position: absolute;
      border-radius: 50%;
      opacity: 0.08;
    }
    .bg-circle-1 {
      width: 600px;
      height: 600px;
      background: #e94560;
      top: -200px;
      right: -100px;
    }
    .bg-circle-2 {
      width: 400px;
      height: 400px;
      background: #4ade80;
      bottom: -150px;
      left: -100px;
    }

    .content {
      display: flex;
      align-items: center;
      gap: 80px;
      z-index: 1;
    }

    /* Left side - text */
    .text-side {
      max-width: 520px;
    }

    .title {
      font-size: 56px;
      font-weight: 700;
      color: #fff;
      margin-bottom: 16px;
      letter-spacing: 1px;
    }

    .subtitle {
      font-size: 22px;
      color: #8892a4;
      line-height: 1.6;
      margin-bottom: 36px;
    }

    .features {
      list-style: none;
    }

    .features li {
      font-size: 17px;
      color: #b0b8c8;
      padding: 8px 0;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .features li .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #e94560;
      flex-shrink: 0;
    }

    /* Right side - popup screenshot */
    .popup-side {
      position: relative;
    }

    .popup-frame {
      border-radius: 16px;
      box-shadow:
        0 25px 80px rgba(233, 69, 96, 0.15),
        0 10px 40px rgba(0, 0, 0, 0.4);
      overflow: hidden;
    }

    .popup-frame img {
      display: block;
      height: 600px;
      width: auto;
    }

    /* Glow effect behind popup */
    .popup-glow {
      position: absolute;
      width: 300px;
      height: 500px;
      background: radial-gradient(ellipse, rgba(233, 69, 96, 0.12) 0%, transparent 70%);
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: -1;
    }
  </style>
</head>
<body>
  <div class="bg-circle bg-circle-1"></div>
  <div class="bg-circle bg-circle-2"></div>

  <div class="content">
    <div class="text-side">
      <h1 class="title">Hush Meet</h1>
      <p class="subtitle">Google Meet で話していない時に<br>自動でミュート。<br>雑音をシャットアウト。</p>
      <ul class="features">
        <li><span class="dot"></span>発話を検出して自動ミュート解除</li>
        <li><span class="dot"></span>発話終了後、猶予時間を経て自動ミュート</li>
        <li><span class="dot"></span>リアルタイム音声レベルメーター</li>
        <li><span class="dot"></span>感度・猶予時間をカスタマイズ可能</li>
      </ul>
    </div>

    <div class="popup-side">
      <div class="popup-glow"></div>
      <div class="popup-frame">
        <img src="popup-screenshot.png" alt="Hush Meet Popup">
      </div>
    </div>
  </div>
</body>
</html>
