<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Tetris - Hush Meet</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        background: #05050f;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100vh;
        overflow: hidden;
        font-family: "Courier New", monospace;
        color: #d0d0ff;
      }
      /* CRT scanlines */
      body::after {
        content: "";
        position: fixed;
        inset: 0;
        background: repeating-linear-gradient(
          0deg,
          transparent 0px,
          transparent 2px,
          rgba(0, 255, 170, 0.015) 2px,
          rgba(0, 255, 170, 0.015) 4px
        );
        pointer-events: none;
        z-index: 10;
      }
      /* CRT vignette */
      body::before {
        content: "";
        position: fixed;
        inset: 0;
        background: radial-gradient(ellipse at center, transparent 50%, rgba(5, 5, 15, 0.7) 100%);
        pointer-events: none;
        z-index: 10;
      }
      .hud {
        display: flex;
        justify-content: space-between;
        width: 440px;
        padding: 8px 0;
        font-size: 14px;
        letter-spacing: 2px;
        text-transform: uppercase;
        z-index: 1;
      }
      .hud-score {
        color: #00ffaa;
        text-shadow: 0 0 8px rgba(0, 255, 170, 0.6);
      }
      .hud-level {
        color: #ff2a6d;
        text-shadow: 0 0 8px rgba(255, 42, 109, 0.6);
      }
      canvas {
        border: 1px solid rgba(0, 255, 170, 0.2);
        box-shadow:
          0 0 20px rgba(0, 255, 170, 0.08),
          inset 0 0 30px rgba(0, 0, 0, 0.5);
        z-index: 1;
      }
      .overlay {
        position: absolute;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 20;
        background: rgba(5, 5, 15, 0.85);
        cursor: pointer;
      }
      .overlay.hidden {
        display: none;
        pointer-events: none;
      }
      .overlay h1 {
        font-size: 28px;
        color: #00ffaa;
        text-shadow:
          0 0 12px rgba(0, 255, 170, 0.8),
          0 0 24px rgba(0, 255, 170, 0.4);
        letter-spacing: 4px;
        margin-bottom: 12px;
      }
      .overlay p {
        font-size: 13px;
        color: #6060aa;
        letter-spacing: 1px;
        margin-bottom: 6px;
      }
      .overlay .result {
        font-size: 18px;
        color: #ff2a6d;
        text-shadow: 0 0 8px rgba(255, 42, 109, 0.6);
        margin-bottom: 16px;
        letter-spacing: 2px;
      }
      .overlay .start-hint {
        font-size: 12px;
        color: #00e5ff;
        text-shadow: 0 0 6px rgba(0, 229, 255, 0.5);
        animation: blink 1.2s infinite;
        margin-top: 16px;
      }
      @keyframes blink {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0.3;
        }
      }
    </style>
  </head>
  <body>
    <div class="hud">
      <span class="hud-score">SCORE: <span id="score">0</span></span>
      <span class="hud-level">LEVEL: <span id="level">1</span></span>
    </div>
    <canvas id="game" width="440" height="520"></canvas>
    <div class="overlay" id="overlay">
      <h1>TETRIS</h1>
      <p id="result-text" class="result"></p>
      <p>&larr; &rarr; : move</p>
      <p>&uarr; : rotate</p>
      <p>&darr; : soft drop</p>
      <p>SPACE : hard drop</p>
      <p class="start-hint">CLICK TO START</p>
    </div>

    <script src="tetris.js"></script>
  </body>
</html>
